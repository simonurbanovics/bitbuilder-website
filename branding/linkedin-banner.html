<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1584px; height: 396px; overflow: hidden; }
  .banner {
    position: relative;
    width: 1584px; height: 396px;
    background:
      radial-gradient(680px 520px at 1230px 150px, rgba(6,182,212,.18), transparent 70%),
      linear-gradient(115deg, #0b1120 0%, #0f172a 52%, #0c2530 100%);
    font-family: "Inter", system-ui, sans-serif;
    overflow: hidden;
  }
  /* faint engineering grid */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(148,163,184,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148,163,184,.05) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: linear-gradient(90deg, transparent, #000 40%);
  }

  /* content lockup — starts well clear of the bottom-left avatar zone */
  .content { position: absolute; left: 432px; top: 92px; }
  .brandline { display: flex; align-items: center; gap: 18px; }
  .glyph { display: grid; grid-template-columns: repeat(2, 25px); grid-auto-rows: 25px; gap: 6px; }
  .glyph i { border-radius: 6px; background: #06b6d4; display: block; }
  .glyph i:nth-child(2), .glyph i:nth-child(3) { opacity: .42; }
  .wordmark { font-family: "JetBrains Mono", monospace; font-weight: 700; font-size: 58px; letter-spacing: -1px; color: #f8fafc; }

  .rule { width: 74px; height: 3px; background: #06b6d4; border-radius: 2px; margin: 26px 0 22px; }

  .tagline { font-family: "JetBrains Mono", monospace; font-weight: 500; font-size: 27px; color: #67e8f9; letter-spacing: .2px; }
  .sub { margin-top: 14px; font-family: "Inter", sans-serif; font-weight: 400; font-size: 20px; color: #94a3b8; }

  .url {
    position: absolute; left: 432px; top: 316px;
    font-family: "JetBrains Mono", monospace; font-weight: 500; font-size: 19px; color: #22d3ee;
    display: flex; align-items: center; gap: 10px;
  }
  .url::before { content: ""; width: 8px; height: 8px; border-radius: 2px; background: #22d3ee; }

  /* decorative block cluster, right side — echoes the mark */
  .blocks { position: absolute; right: 96px; top: 96px; width: 300px; height: 210px; }
  .blocks span { position: absolute; border-radius: 12px; }
  .b1 { width: 96px; height: 96px; left: 150px; top: 0;   background: rgba(6,182,212,.22); }
  .b2 { width: 96px; height: 96px; left: 40px;  top: 58px; border: 3px solid rgba(103,232,249,.45); }
  .b3 { width: 96px; height: 96px; left: 160px; top: 112px; background: rgba(6,182,212,.40); }
  .b4 { width: 64px; height: 64px; left: 262px; top: 150px; background: rgba(34,211,238,.30); }
  .b5 { width: 64px; height: 64px; left: 6px;   top: 6px;  border: 3px solid rgba(148,163,184,.22); }
</style>
</head>
<body>
  <div class="banner">
    <div class="grid"></div>

    <div class="blocks">
      <span class="b5"></span>
      <span class="b1"></span>
      <span class="b2"></span>
      <span class="b3"></span>
      <span class="b4"></span>
    </div>

    <div class="content">
      <div class="brandline">
        <span class="glyph"><i></i><i></i><i></i><i></i></span>
        <span class="wordmark">BitBuilder</span>
      </div>
      <div class="rule"></div>
      <div class="tagline">Senior AI · Cloud · Full-stack Engineering</div>
      <div class="sub">Production systems, designed and shipped — from first sketch to deploy.</div>
    </div>

    <div class="url">bitbuilder.tech</div>
  </div>
</body>
</html>
